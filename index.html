<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warehouse Simulation Engine</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #1e1e2e;
        color: #cdd6f4;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }
      
      #sidebar {
        width: 300px;
        background-color: #181825;
        padding: 20px;
        border-right: 2px solid #313244;
        display: flex;
        flex-direction: column;
      }

      #main-view {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      #warehouse-canvas {
        background-color: #11111b;
        border: 2px solid #45475a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      
      h1 { font-size: 1.5rem; margin-top: 0; border-bottom: 1px solid #313244; padding-bottom: 10px; }
      .metric-box { background: #313244; padding: 15px; margin-bottom: 15px; border-radius: 6px; }
      .metric-value { font-size: 2rem; font-weight: bold; color: #a6e3a1; }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>⚙️ Control Panel</h1>
      <div class="metric-box">
        <div>Master Clock</div>
        <div class="metric-value" id="ui-clock">00:00:00</div>
      </div>
      <div class="metric-box">
        <div>Orders Processed</div>
        <div class="metric-value" id="ui-orders">0</div>
      </div>
    </div>
    <div id="main-view">
      <canvas id="warehouse-canvas" width="800" height="600"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
